name: Build VST3

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-windows:
    name: Windows VST3
    runs-on: windows-latest

    steps:
    - name: Checkout plugin
      uses: actions/checkout@v4
      with:
        path: rygo_plugin

    - name: Clone VST3 SDK
      run: |
        git clone --depth 1 --branch v3.8.0_build_66 ^
          https://github.com/steinbergmedia/vst3sdk.git vst3sdk
      shell: cmd

    - name: Init VST3 SDK submodules
      working-directory: vst3sdk
      run: |
        git submodule update --init --depth 1 base cmake pluginterfaces public.sdk vstgui4

    - name: Copy plugin into SDK
      shell: pwsh
      run: |
        $dest = "vst3sdk/public.sdk/samples/vst/rygosampler"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Copy-Item -Recurse "rygo_plugin/source"   "$dest/source"
        Copy-Item -Recurse "rygo_plugin/resource"  "$dest/resource"
        Copy-Item           "rygo_plugin/CMakeLists.txt" "$dest/"

    - name: Configure
      run: >
        cmake -B build vst3sdk
        -G "Visual Studio 17 2022" -A x64
        -DSMTG_ENABLE_VST3_PLUGIN_EXAMPLES=ON
        -DSMTG_ENABLE_VST3_HOSTING_EXAMPLES=OFF
        -DSMTG_ENABLE_VSTGUI_SUPPORT=ON
        -DSMTG_ENABLE_AUV2_BUILDS=OFF
        -DSMTG_RUN_VST_VALIDATOR=OFF

    - name: Build
      run: cmake --build build --config Release --target rygo_sampler -j4

    - name: Stage release folder
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path release | Out-Null
        Copy-Item -Recurse "build/VST3/Release/rygo_sampler.vst3" "release/"
        Copy-Item "rygo_plugin/install_windows.bat" "release/install.bat"

    - name: Upload VST3 artifact
      uses: actions/upload-artifact@v4
      with:
        name: rygo_sampler_windows
        path: release/
        retention-days: 30
